"$schema" = 'https://starship.rs/config-schema.json'

format = """
$shell\
$username\
$hostname\
$directory\
$ruby\
$python\
$golang\
$terraform\
$kubernetes\
$gcloud\
$git_branch\
$git_commit\
$git_state\
$git_status\
$line_break\
$character
"""

[shell]
disabled = false
bash_indicator = 'Όζι '
zsh_indicator = ''
format = '[$indicator]($style)'

[username]
style_user = 'bold green'
show_always = true
format = '[\[](bold)[$user]($style)[@](bold)'

[hostname]
ssh_symbol = " ΌυΒ"
style = 'bold yellow'
ssh_only = false
format = '[$hostname$ssh_symbol]($style)[:](bold)'

[directory]
read_only = " ≤░Ν╛"
truncation_length = 8
truncation_symbol = '.../'
style = 'bold blue'
truncate_to_repo = false
before_repo_root_style = 'bold dimmed white'
repo_root_style = 'bold blue'
format = '[$path]($style)[$read_only]($read_only_style)[\]](bold) '
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style)\] '

[ruby]
symbol = "ΌηΣ "
format = '\[[$symbol$version]($style)\] '

[golang]
symbol = "Όαπ "
format = '\[[$symbol$version]($style)\] '

[python]
symbol = "ΌΙ╡ "
format = '\[[$symbol$version]($style)\] '

[terraform]
symbol = "Όλ╜ "
format = '\[[$symbol$version]($style)\] '

[perl]
symbol = "Όζσ "

[nodejs]
symbol = "Όεα "

[gcloud]
symbol = "Όθ▒ "
disabled = true

[kubernetes]
symbol = "Όιζ "
disabled = false
style = 'cyan'
format = '\[[$symbol$context/$namespace]($style)\] '

[[kubernetes.contexts]]
context_pattern = ".*/api-(?P<ocpcluster>(sb|pp)[\\w-]+)-caas.*"
context_alias = '$ocpcluster'

[[kubernetes.contexts]]
style = "red"
context_pattern = ".*/api-(?P<ocpcluster>pd[\\w-]+)-caas.*"
context_alias = '$ocpcluster'

[git_branch]
symbol = "ΎΡα "
style = 'green'
format = '[\[](bold)[$symbol$branch(:$remote_branch)]($style)[\]](bold) '

[git_status]
style = ''
conflicted = '= '
ahead = '[έΘκ](blue) '
behind = '[έΘμ](red) '
diverged = 'έΘΧ '
untracked = '[?](cyan) '
stashed = '[\$](blue) '
modified = '[!](yellow) '
staged = '[έεγ](green) '
renamed = '┬╗ '
deleted = '[έεΨ](red) '
format = '([$all_status$ahead_behind]($style) )'

[character]
success_symbol = '%'
error_symbol = '[%](red)'
